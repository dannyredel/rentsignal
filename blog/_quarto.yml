project:
  type: website
  output-dir: _site
  resources:
    - robots.txt

website:
  title: "RentSignal Blog"
  description: "Data-driven insights on the German rental market. Mietpreisbremse compliance, rent prediction, renovation ROI, and spatial analytics."
  site-url: https://blog.rentsignal.de
  favicon: assets/favicon.ico

  navbar:
    background: "#0f172a"
    foreground: "#ffffff"
    logo: assets/logo.svg
    left:
      - text: "Articles"
        href: index.qmd
      - text: "RentSignal"
        href: https://rentsignal.de
        target: _blank
    right:
      - icon: github
        href: https://github.com/dannyredel/rentsignal
        target: _blank

  page-footer:
    center: |
      &copy; 2026 RentSignal &middot; [rentsignal.de](https://rentsignal.de)

  open-graph: true
  twitter-card: true

  search:
    location: navbar
    type: textbox

  # SEO: canonical URLs auto-generated from site-url
  page-navigation: true

  # Google Analytics 4
  google-analytics:
    tracking-id: "G-85X4K34WMV"
    anonymize-ip: true

  # GDPR cookie consent
  cookie-consent:
    type: express
    style: headline
    palette: dark


format:
  html:
    theme: cosmo
    css: assets/custom.css
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    lang: de
    author-meta: "Daniel Redel"

execute:
  freeze: auto
